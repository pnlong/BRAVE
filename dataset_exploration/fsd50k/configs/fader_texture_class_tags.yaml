# FSD50K texture_class taxonomy (12 classes: 10 texture + 2 non-texture).
# dataset_exploration/fsd50k/configs/ — used by build_attribute_sidecar.py --scheme texture_class
#
# Texture training: keep classes 0-9 only; exclude 10 (human/vocal) and 11 (music).
# Multi-label clips: first matching class in priority_order wins.

class_names:
  0: water_liquid
  1: air_wind
  2: weather_storm
  3: fire_explosion
  4: nature_living
  5: domestic_indoor
  6: mechanical_machine
  7: transport_vehicle
  8: materials_impact
  9: tonal_alert
  10: human_vocal_body
  11: music_percussion

# Exclusion checked first so music-tagged ambience does not leak into texture buckets.
priority_order:
  - music_percussion
  - human_vocal_body
  - weather_storm
  - water_liquid
  - fire_explosion
  - air_wind
  - nature_living
  - mechanical_machine
  - transport_vehicle
  - domestic_indoor
  - materials_impact
  - tonal_alert

